services:
  streamvault:
    build: .
    container_name: streamvault-local
    ports:
      - "8080:8080"
    volumes:
      - ./data-local:/data
    environment:
      - DataDirectory=/data
      - Redis__ConnectionString=redis:6379
      - Jwt__Secret=${JWT_SECRET}
      - Tmdb__ApiKey=${TMDB_API_KEY}
      - Transcoding__FfmpegPath=/usr/bin/ffmpeg
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: streamvault-redis-local
    volumes:
      - redis-local-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  redis-local-data:
