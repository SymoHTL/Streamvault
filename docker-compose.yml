services:
  streamvault:
    build: .
    container_name: streamvault
    volumes:
      - ./data:/data
    environment:
      - DataDirectory=/data
      - Redis__ConnectionString=redis:6379
      - Jwt__Secret=${JWT_SECRET}
      - Tmdb__ApiKey=${TMDB_API_KEY}
      - Transcoding__FfmpegPath=/usr/bin/ffmpeg
      - CorsOrigins__0=https://stream.symo.dev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.streamvault.rule=Host(`stream.symo.dev`)"
      - "traefik.http.routers.streamvault.entrypoints=https"
      - "traefik.http.routers.streamvault.tls.certresolver=letsencrypt"
      - "traefik.http.services.streamvault.loadbalancer.server.port=8080"
      - "traefik.docker.network=traefik_proxy"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - default
      - traefik_proxy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: streamvault-redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  redis-data:

networks:
  traefik_proxy:
    external: true
