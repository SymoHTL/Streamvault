services:
  streamvault:
    build: .
    container_name: streamvault
    ports:
      - "8080:8080"
    volumes:
      - streamvault-data:/data
    environment:
      - DataDirectory=/data
      - Redis__ConnectionString=redis:6379
      - Jwt__Secret=change-this-to-a-secure-random-string-at-least-32-chars
      - CorsOrigins__0=http://localhost:8080
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: streamvault-redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  streamvault-data:
  redis-data:
